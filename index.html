<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Merilia — Envie. Nouveau single disponible le 1er mai. Reçois le rappel en avant-première.">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Merilia - Envie | Sortie le 1er mai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       🎨 DESIGN TOKENS — Silver / Chrome palette
       ============================================ */
    :root {
      --bg: #060608;
      --bg2: #0e0e12;
      --card-border: rgba(255,255,255,0.07);

      /* Silver text hierarchy — bright for readability */
      --t1: #ffffff;
      --t2: rgba(240,240,248,0.7);
      --t3: rgba(220,220,230,0.45);

      /* Chrome / Silver accent */
      --silver: #d0d0dc;
      --silver-light: #e2e2ee;
      --silver-bright: #eeeef4;
      --silver-dim: rgba(192,192,204,0.1);
      --silver-glow: rgba(192,192,204,0.2);

      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(0.16,1,0.3,1);
      --spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ============================================
       RESET
       ============================================ */
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
    html, body { height:100%; overflow:hidden }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--t1);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================
       COVER ART BACKGROUND — Visible wallpaper
       ============================================ */
    .bg-cover {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('cover.jpg') center center / cover no-repeat;
      filter: blur(12px) saturate(1) brightness(0.9);
      transform: scale(1.05) translateZ(0); /* GPU acceleration */
      opacity: 1;
      pointer-events: none;
      will-change: transform;
    }

    /* Soft vignette — lets the cover breathe */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(6,6,8,0.3) 0%, rgba(6,6,8,0.7) 80%),
        linear-gradient(180deg, rgba(6,6,8,0.2) 0%, rgba(6,6,8,0.5) 100%);
    }

    /* Subtle noise texture for depth */
    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ============================================
       LAYOUT
       ============================================ */
    .container {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      animation: fadeUp .9s var(--ease) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px) }
      to   { opacity:1; transform:translateY(0) }
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px) }
      to   { opacity:1; transform:translateY(0) }
    }

    /* ============================================
       COVER — Circle avatar with silver ring
       ============================================ */
    .cover-circle {
      width: clamp(90px, 24vw, 110px);
      height: clamp(90px, 24vw, 110px);
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #66666664, var(--silver-bright), #5b5b5b64, var(--silver-bright), #666);
      background-size: 200% 200%;
      animation: fadeIn .8s .1s both, chromeShift 5s ease-in-out infinite;
      margin-bottom: 24px;
      box-shadow:
        0 0 24px rgba(200,200,220,0.1),
        0 4px 20px rgba(0,0,0,0.4);
    }

    .cover-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }


    /* ============================================
       ARTIST NAME — MERILIA (chrome gradient)
       ============================================ */
    .artist-name {
      font-size: clamp(36px, 10.5vw, 52px);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(
        135deg,
        #888 0%,
        var(--silver-bright) 25%,
        #fff 50%,
        var(--silver-bright) 75%,
        #888 100%
      );
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn .8s .2s both, chromeShift 8s ease-in-out infinite;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
      will-change: background-position;
      transform: translateZ(0);
    }

    @keyframes chromeShift {
      0%, 100% { background-position: 0% 50% }
      50%      { background-position: 100% 50% }
    }

    /* ============================================
       TRACK TITLE — "Envie"
       ============================================ */
    .track-title {
      font-size: clamp(17px, 4.8vw, 22px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.08em;
      color: var(--silver);
      opacity: .75;
      margin-bottom: 32px;
      animation: fadeIn .8s .35s both;
    }

    /* ============================================
       DIVIDER — Metallic line
       ============================================ */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--silver), transparent);
      opacity: .25;
      margin-bottom: 28px;
      animation: fadeIn .8s .4s both;
    }

    /* ============================================
       HEADLINE — "Disponible dans"
       ============================================ */
    .headline {
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 18px;
      animation: fadeIn .8s .45s both;
    }

    /* ============================================
       COUNTDOWN
       ============================================ */
    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
      animation: fadeIn .8s .55s both;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .cd-box {
      position: relative;
      width: clamp(60px, 16.5vw, 74px);
      height: clamp(70px, 19.5vw, 86px);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle top highlight — chrome reflection */
    .cd-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
      pointer-events: none;
    }

    .cd-val {
      font-size: clamp(26px, 7.5vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--silver-bright);
      transition: transform .3s var(--spring), opacity .3s;
    }

    .cd-val.tick {
      animation: digitTick .4s var(--spring);
    }

    @keyframes digitTick {
      0%   { transform: scale(1.12); opacity:.5 }
      100% { transform: scale(1);    opacity:1 }
    }

    .cd-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
    }

    .cd-sep {
      font-size: clamp(22px, 6.5vw, 32px);
      font-weight: 300;
      color: var(--t3);
      padding-top: clamp(16px, 4.5vw, 20px);
      opacity: .3;
      animation: sepPulse 2s ease-in-out infinite;
    }

    @keyframes sepPulse {
      0%, 100% { opacity:.3 }
      50%      { opacity:.12 }
    }

    /* OUT NOW state */
    .out-now {
      font-size: clamp(46px, 13vw, 68px);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #888, var(--silver-bright), #fff, var(--silver-bright), #888);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: chromeShift 3s ease-in-out infinite, scaleIn .6s var(--spring) both;
      margin-bottom: 32px;
    }

    @keyframes scaleIn {
      from { opacity:0; transform:scale(.8) }
      to   { opacity:1; transform:scale(1) }
    }

    /* (subtext removed) */

    /* ============================================
       CTA BUTTON — Chrome / Silver premium
       ============================================ */
    .cta-wrap {
      animation: fadeIn .8s .65s both;
      width: 100%;
      margin-top: 40px;
    }

    .cta-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 280px;
      padding: 22px 30px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, #999, var(--silver-light), #fff, var(--silver-light), #999);
      background-size: 400% 400%;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      outline: none;
      overflow: hidden;
      transition: all .4s var(--ease);
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.4);
      animation: chromeBtn 6s ease-in-out infinite;
      transform: translateZ(0);
      will-change: transform;
    }

    /* Liquid chrome effect — smoother transitions */
    @keyframes chromeBtn {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* (ctaPulse removed for performance) */

    /* Bright shimmer sweep */
    .cta-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      animation: shimmer 2.5s linear infinite;
    }

    /* Continuous shimmer sweep — removed pauses for smoothness */
    @keyframes shimmer {
      0%   { left: -120%; }
      100% { left: 150%; }
    }

    /* Outer silver glow — always slightly visible */
    .cta-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--silver), #fff, var(--silver-bright));
      z-index: -1;
      opacity: 0.15;
      filter: blur(20px);
      transition: opacity .4s;
      animation: glowBreath 4s ease-in-out infinite;
      will-change: opacity, transform;
    }

    /* Ultra-smooth breathing glow using GPU-accelerated properties */
    @keyframes glowBreath {
      0%, 100% { opacity: 0.08; transform: scale(1.0); }
      50%      { opacity: 0.25; transform: scale(1.08); }
    }

    .cta-btn:hover::after { opacity: .6; animation: none }
    .cta-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 0 40px rgba(220,220,235,0.3),
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .cta-btn:active { transform: translateY(0) scale(.96); transition-duration:.1s }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripAnim .6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripAnim { to { transform:scale(4); opacity:0 } }

    /* ============================================
       MODAL
       ============================================ */
    .modal-ov {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background .4s var(--ease);
    }

    .modal-ov.active {
      background: rgba(0,0,0,0.65);
      pointer-events: auto;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .modal-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg2);
      border: 1px solid var(--card-border);
      border-bottom: none;
      border-radius: 18px 18px 0 0;
      padding: 28px 24px;
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 20px));
      transform: translateY(100%);
      transition: transform .4s var(--ease);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-ov.active .modal-card { transform: translateY(0) }

    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      margin: 0 auto 22px;
    }

    .modal-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--silver-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--silver);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--t2);
      margin-bottom: 24px;
      text-align: center;
    }

    .modal-text strong {
      color: var(--t1);
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 5%;
    }

    /* Primary button — (unused now that we have the slider) */
    .btn-p { display: none; }

    /* ============================================
       SLIDER "SLIDE TO UNLOCK" — Premium Version
       ============================================ */
    .slide-track {
      position: relative;
      width: 100%;
      height: 60px;
      background: rgba(192, 192, 204, 0.25);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px;
      padding: 5px;
      overflow: hidden;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      user-select: none;
      transform: translateZ(0);
    }

    .slide-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--t3);
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideShimmer 3s infinite linear;
    }

    @keyframes slideShimmer {
      0% { background-position: 200% 0%; }
      100% { background-position: -200% 0%; }
    }

    .slide-handle {
      position: relative;
      z-index: 2;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--silver-bright), var(--silver), #888);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
      transition: transform 0.1s linear; /* for subtle touch follow */
      touch-action: none;
    }

    .slide-handle:active { cursor: grabbing; }

    .slide-handle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--bg);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: translateX(1px);
    }

    .slide-complete .slide-handle {
      background: #fff;
    }
    .slide-complete .slide-text {
      display: none;
    }

    /* (Secondary button removed) */
    .btn-s { display: none; }

    /* ============================================
       INPUT FIELD — Premium Silver
       ============================================ */
    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }
    .input-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--t3);
      margin-bottom: 8px;
      display: block;
    }
    .handle-input-wrap {
      position: relative;
      width: 100%;
    }
    .handle-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px 16px 16px 36px;
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      outline: none;
      transition: all 0.3s var(--ease);
    }
    .handle-input:focus {
      border-color: var(--silver-bright);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 15px var(--silver-glow);
    }
    .at-prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--t3);
      font-weight: 600;
      pointer-events: none;
    }
    
    .success-state {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success-state h3 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--silver-bright);
    }
    .success-state p {
      color: var(--t2);
      font-size: 14px;
      line-height: 1.5;
    }
    .success-icon {
      width: 60px;
      height: 60px;
      background: var(--silver-bright);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: scaleIn .6s var(--spring) both;
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: var(--bg);
      stroke-width: 3;
    }
    @media (min-width: 640px) {
      .modal-ov { align-items: center }
      .modal-card {
        border-radius: 18px;
        border-bottom: 1px solid var(--card-border);
        max-width: 400px;
        padding-bottom: 28px;
        transform: translateY(30px);
        opacity: 0;
        transition: transform .4s var(--ease), opacity .4s var(--ease);
      }
      .modal-ov.active .modal-card { transform: translateY(0); opacity: 1 }
      .modal-handle { display: none }
    }

    /* ============================================
       ACCESSIBILITY — Reduced motion
       ============================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-cover" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- Main content -->
  <main class="container" role="main">

    <!-- Cover art in silver circle -->
    <div class="cover-circle">
      <img src="cover.jpg" alt="Merilia — Envie" width="110" height="110">
    </div>

    <!-- Artist branding -->
    <h1 class="artist-name">Merilia</h1>
    <p class="track-title">Envie</p>
    <div class="divider" aria-hidden="true"></div>

    <!-- Countdown -->
    <p class="headline">Disponible dans</p>
    <div class="countdown" id="countdown" aria-live="polite">
      <div class="cd-unit">
        <div class="cd-box"><span class="cd-val" id="cd-d">--</span></div>
        <span class="cd-label">Jours</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <div class="cd-box"><span class="cd-val" id="cd-h">--</span></div>
        <span class="cd-label">Heures</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <div class="cd-box"><span class="cd-val" id="cd-m">--</span></div>
        <span class="cd-label">Minutes</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <div class="cd-box"><span class="cd-val" id="cd-s">--</span></div>
        <span class="cd-label">Secondes</span>
      </div>
    </div>


    <!-- CTA -->
    <div class="cta-wrap">
      <button class="cta-btn" id="cta-btn" type="button">Recevoir le rappel</button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-ov" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-handle" aria-hidden="true"></div>
      <div class="modal-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="var(--silver)" stroke="none"/></svg>
      </div>
      <div id="modal-content">
        <p class="modal-text">
          Laisse-moi ton Instagram pour être ajouté à la liste.<br>
          Je t'enverrai le lien par DM le 1er mai à 23h59.
        </p>
        
        <div class="input-group">
          <label class="input-label">Ton Instagram</label>
          <div class="handle-input-wrap">
            <span class="at-prefix">@</span>
            <input type="text" id="handle-input" class="handle-input" placeholder="ton_pseudo" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="modal-actions">
          <div class="slide-track" id="slide-track">
            <div class="slide-text">Glisser pour s'inscrire</div>
            <div class="slide-handle" id="slide-handle">
              <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </div>
        </div>
      </div>

      <div id="modal-success" class="success-state">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h3>T'es inscrit !</h3>
        <p>Prépare-toi, je t'envoie ça <br><strong>vendredi à 23h59</strong>. 🔥</p>
      </div>
    </div>
  </div>

  <script>
    /* ⚙️ CONFIG — Easy to change */
    const RELEASE_DATE = new Date('2026-05-01T23:59:00');
    const IG_USER = 'merilia_dnb';

    /* === COUNTDOWN === */
    const els = {
      d: document.getElementById('cd-d'),
      h: document.getElementById('cd-h'),
      m: document.getElementById('cd-m'),
      s: document.getElementById('cd-s')
    };
    const prev = { d:'', h:'', m:'', s:'' };
    let ended = false;

    function tick() {
      if (ended) return;
      const diff = RELEASE_DATE.getTime() - Date.now();

      if (diff <= 0) {
        ended = true;
        document.getElementById('countdown').innerHTML = '<span class="out-now">OUT NOW</span>';
        document.querySelector('.headline').textContent = '';
        document.querySelector('.subtext').textContent = 'Le single est disponible maintenant';
        return;
      }

      const vals = {
        d: String(Math.floor(diff / 864e5)).padStart(2, '0'),
        h: String(Math.floor((diff % 864e5) / 36e5)).padStart(2, '0'),
        m: String(Math.floor((diff % 36e5) / 6e4)).padStart(2, '0'),
        s: String(Math.floor((diff % 6e4) / 1e3)).padStart(2, '0')
      };

      for (const k in vals) {
        if (vals[k] !== prev[k]) {
          els[k].textContent = vals[k];
          els[k].classList.remove('tick');
          void els[k].offsetWidth; /* reflow to restart animation */
          els[k].classList.add('tick');
          prev[k] = vals[k];
        }
      }
    }

    tick();
    setInterval(tick, 1000);

    /* === CTA + MODAL === */
    const modal = document.getElementById('modal');
    const ctaBtn = document.getElementById('cta-btn');

    ctaBtn.addEventListener('click', function(e) {
      /* Ripple micro-interaction */
      const r = document.createElement('span');
      r.classList.add('ripple');
      const rect = this.getBoundingClientRect();
      const sz = Math.max(rect.width, rect.height);
      r.style.width = r.style.height = sz + 'px';
      r.style.left = (e.clientX - rect.left - sz / 2) + 'px';
      r.style.top = (e.clientY - rect.top - sz / 2) + 'px';
      this.appendChild(r);
      r.addEventListener('animationend', () => r.remove());

      /* Open modal */
      setTimeout(() => {
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
      }, 120);
    });

    modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    function closeModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    /* === SLIDER LOGIC === */
    const track = document.getElementById('slide-track');
    const handle = document.getElementById('slide-handle');
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    let maxTranslate = 0;

    function initSlider() {
      maxTranslate = track.clientWidth - handle.clientWidth - 10; // 10 is padding*2
    }

    // Recalculate on open/resize
    window.addEventListener('resize', initSlider);
    ctaBtn.addEventListener('click', () => setTimeout(initSlider, 200));

    function onStart(e) {
      if (ended) return;
      isDragging = true;
      const x = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
      const rect = track.getBoundingClientRect();
      
      // Calculate where on the track we touched
      const touchX = x - rect.left - 25; // 25 is half handle width
      startX = x - Math.max(0, Math.min(maxTranslate, touchX));
      
      handle.style.transition = 'none';
      onMove(e); // Initial move to snap handle if needed
    }

    function onMove(e) {
      if (!isDragging) return;
      const x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
      currentX = Math.max(0, Math.min(maxTranslate, x - startX));
      
      // Use requestAnimationFrame for smooth 60fps movement
      requestAnimationFrame(() => {
        if (!isDragging && currentX !== maxTranslate) return; 
        handle.style.transform = `translateX(${currentX}px)`;
        const progress = currentX / maxTranslate;
        track.querySelector('.slide-text').style.opacity = 1 - (progress * 1.5);
      });
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      
      if (currentX >= maxTranslate * 0.85) { // Slightly more indulgent threshold (85%)
        handle.style.transition = 'all 0.3s var(--ease)';
        handle.style.transform = `translateX(${maxTranslate}px)`;
        track.classList.add('slide-complete');
        if (window.navigator.vibrate) window.navigator.vibrate(20);
        setTimeout(triggerRedirect, 300);
      } else {
        handle.style.transition = 'transform 0.4s var(--spring)';
        handle.style.transform = 'translateX(0)';
        track.querySelector('.slide-text').style.opacity = 1;
        currentX = 0;
      }
    }

    // Event listeners on the track instead of just the handle for "indulgent" UX
    track.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    track.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    // Enter Key Support & Keyboard focus fix
    const handleInput = document.getElementById('handle-input');
    
    handleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleInput.blur();
        autoSlideAndSubmit();
      }
    });

    handleInput.addEventListener('focus', () => {
      // Small delay to let keyboard appear, then scroll into view
      setTimeout(() => {
        handleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    });

    function autoSlideAndSubmit() {
      if (isDragging || ended) return;
      
      const username = handleInput.value.trim();
      if (!username) {
        // Shake if empty
        const trackEl = document.getElementById('slide-track');
        trackEl.style.animation = 'shake 0.4s ease';
        setTimeout(() => trackEl.style.animation = '', 400);
        return;
      }

      // Visual automated slide
      handle.style.transition = 'transform 0.6s var(--ease)';
      handle.style.transform = `translateX(${maxTranslate}px)`;
      track.classList.add('slide-complete');
      track.querySelector('.slide-text').style.opacity = 0;
      
      setTimeout(triggerRedirect, 600);
    }

    async function triggerRedirect() {
      const handleInput = document.getElementById('handle-input');
      const username = handleInput.value.trim().replace(/^@/, '');
      
      if (!username) {
        const track = document.getElementById('slide-track');
        track.style.animation = 'shake 0.4s ease';
        setTimeout(() => track.style.animation = '', 400);
        isDragging = false;
        handle.style.transition = 'transform 0.4s var(--spring)';
        handle.style.transform = 'translateX(0)';
        track.querySelector('.slide-text').style.opacity = 1;
        currentX = 0;
        track.classList.remove('slide-complete');
        return;
      }

      // Display "processing" state slightly
      track.querySelector('.slide-text').textContent = 'Enregistrement...';

      /* 
       * 🚀 DATA COLLECTION 
       * This sends the handle to your secret admin page/central sheet
       */
      const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwBokoSbC7lTjIfHVcCSkj8a-6gesAELVCFIJxPoM881iSqv0PZpTmtoloeOspKTZYo/exec'; // Colle ton lien Google Script ici plus tard
      
      if (SHEET_API_URL) {
        try {
          await fetch(SHEET_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ handle: username, date: new Date().toLocaleString() })
          });
        } catch(e) { console.error(e); }
      }

      // Show success state
      document.getElementById('modal-content').style.display = 'none';
      document.getElementById('modal-success').style.display = 'block';
      setTimeout(closeModal, 3500);
    }
    
    // Keyframes for error shake
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }
    `;
    document.head.appendChild(style);

  </script>
</body>
</html>
