<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Merilia — Envie. Disponible maintenant sur toutes les plateformes.">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Merilia - Envie | Écouter maintenant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       🎨 DESIGN TOKENS — Silver / Chrome palette
       ============================================ */
    :root {
      --bg: #060608;
      --bg2: #0e0e12;
      --card-border: rgba(255,255,255,0.07);

      /* Silver text hierarchy */
      --t1: #ffffff;
      --t2: rgba(240,240,248,0.7);
      --t3: rgba(220,220,230,0.45);

      /* Chrome / Silver accent */
      --silver: #d0d0dc;
      --silver-light: #e2e2ee;
      --silver-bright: #eeeef4;
      --silver-dim: rgba(192,192,204,0.1);
      --silver-glow: rgba(192,192,204,0.2);

      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease: cubic-bezier(0.16,1,0.3,1);
      --spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ============================================
       RESET
       ============================================ */
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
    html, body { height:100%; overflow-x:hidden; background: var(--bg); }
    body {
      font-family: var(--font);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
    }

    /* ============================================
       BACKGROUND LAYERS
       ============================================ */
    .bg-cover {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('cover.jpg') center center / cover no-repeat;
      filter: blur(15px) saturate(1.2) brightness(0.8);
      transform: scale(1.1);
      opacity: 1;
      pointer-events: none;
    }

    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(6,6,8,0.2) 0%, rgba(6,6,8,0.8) 80%),
        linear-gradient(180deg, rgba(6,6,8,0.1) 0%, rgba(6,6,8,0.6) 100%);
    }

    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ============================================
       LAYOUT
       ============================================ */
    .container {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 1s var(--ease) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px) }
      to   { opacity:1; transform:translateY(0) }
    }

    /* ============================================
       HEADER — Cover Art & Artist Info
       ============================================ */
    .cover-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #666, var(--silver-bright), #555, var(--silver-bright), #666);
      background-size: 200% 200%;
      animation: chromeShift 6s ease-in-out infinite;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(200,200,220,0.15), 0 10px 30px rgba(0,0,0,0.5);
    }

    .cover-circle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .artist-name {
      font-size: clamp(38px, 11vw, 56px);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(135deg, #888, var(--silver-bright), #fff, var(--silver-bright), #888);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: chromeShift 10s ease-in-out infinite;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
    }

    @keyframes chromeShift {
      0%, 100% { background-position: 0% 50% }
      50%      { background-position: 100% 50% }
    }

    .track-title {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.1em;
      color: var(--silver);
      opacity: .8;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 24px;
    }

    /* ============================================
       PLATFORM LIST & SLIDERS
       ============================================ */
    .platform-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .platform-item {
      position: relative;
      width: 100%;
      height: 72px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      display: flex;
      align-items: center;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      user-select: none;
      touch-action: pan-y;
      transition: border-color 0.3s, background 0.3s, transform 0.3s var(--ease);
    }

    .platform-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .platform-item:hover .platform-icon {
      transform: scale(1.1);
    }

    /* Button Content */
    .platform-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--t1);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    .platform-icon-box {
      width: 50px;
      height: 50px;
      margin-left: 10px;
      margin-right: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .platform-item:hover .platform-icon-box {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .platform-icon {
      width: 28px;
      height: 28px;
      fill: var(--silver-bright);
      transition: transform 0.3s var(--spring);
    }

    .platform-item::after {
      content: 'ÉCOUTER';
      position: absolute;
      right: 28px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--t3);
      opacity: 0.6;
      transition: all 0.3s;
    }

    .platform-item:hover::after {
      color: var(--t1);
      opacity: 1;
      transform: translateX(5px);
    }

    /* Success state */
    .platform-item.success {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .platform-item.success::after {
      content: '✓';
      color: #fff;
    }

    /* Specific Platform Colors */
    .platform-item[data-platform="spotify"] .platform-icon { fill: #1DB954; }
    .platform-item[data-platform="apple"] .platform-icon { fill: none; stroke: #fff; color: #fff; }
    .platform-item[data-platform="apple"] .platform-icon svg { transform: translateX(-1.5px); }
    .platform-item[data-platform="apple"].success .platform-icon { stroke: var(--bg) !important; color: var(--bg) !important; }
    .platform-item[data-platform="youtube"] .platform-icon { fill: #FF0000; }
    .platform-item[data-platform="deezer"] .platform-icon { fill: #EF5464; }
    .platform-item[data-platform="amazon"] .platform-icon { fill: transparent; }
    .platform-item[data-platform="amazon"] .platform-icon img { filter: none; }
    .platform-item[data-platform="amazon"].success .platform-icon img { filter: brightness(0); }

    /* Others Button */
    .btn-others {
      margin-top: 10px;
      background: transparent;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .btn-others:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--t3);
      color: var(--t1);
    }

    /* ============================================
       MODAL — Others Platforms
       ============================================ */
    .modal-ov {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: all 0.4s var(--ease);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
    }
    .modal-ov.active {
      background: rgba(0,0,0,0.8);
      pointer-events: auto;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-card {
      width: 90%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 32px 24px;
      transform: translateY(40px) scale(0.95);
      opacity: 0;
      transition: all 0.5s var(--spring);
      box-shadow: 0 30px 80px rgba(0,0,0,1);
    }
    .modal-ov.active .modal-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-header {
      margin-bottom: 24px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: var(--t3);
    }

    .others-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .other-platform {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--t2);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .other-platform:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--t3);
      color: var(--t1);
      transform: translateY(-2px);
    }
    .other-icon { width: 20px; height: 20px; fill: var(--t3); }
    .other-platform:hover .other-icon { fill: var(--t1); }

    .btn-close {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: var(--silver-dim);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      color: var(--t1);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-close:hover { background: rgba(255,255,255,0.1); }

    /* ============================================
       FOOTER
       ============================================ */
    .footer {
      margin-top: 60px;
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 40px;
    }

    .social-links {
      display: flex;
      gap: 32px;
    }

    .social-link {
      color: var(--t3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--ease);
      opacity: 0.6;
    }
    .social-link:hover {
      opacity: 1;
      transform: translateY(-3px);
      color: var(--t1);
    }

    .social-icon {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    /* Icons Color Overrides */
    .platform-item[data-platform="spotify"] .platform-icon { fill: #1DB954; }
    .platform-item[data-platform="apple"] .platform-icon { fill: #fff; }
    .platform-item[data-platform="youtube"] .platform-icon { fill: #FF0000; }
    .platform-item[data-platform="deezer"] .platform-icon { fill: #EF5464; }

  </style>
</head>

  <script>
    /* === DEEP LINK HELPERS === */
    function forceSpotify(url) {
      const trackId = url.match(/track\/([a-zA-Z0-9]+)/)?.[1] || '0mNGJ5sdhPVdp7AQiwWz2y';
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
      
      if (isIOS) {
        window.location.href = `spotify:track:${trackId}`;
        setTimeout(() => {
          if (document.hasFocus()) {
            window.open(url, '_blank');
          }
        }, 500);
      } else {
        window.open(url, '_blank');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Init Platform Buttons
      const items = document.querySelectorAll('.platform-item');
      items.forEach((item, index) => {
        // Entrance animation
        item.style.opacity = '0';
        item.style.transform = 'translateY(20px)';
        item.style.cursor = 'pointer';

        setTimeout(() => {
          item.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
          item.style.opacity = '1';
          item.style.transform = 'translateY(0)';
        }, 300 + (index * 100));

        item.addEventListener('click', () => {
          const url = item.dataset.url;
          const platform = item.dataset.platform;
          item.classList.add('success');
          
          if (window.navigator.vibrate) window.navigator.vibrate(30);

          setTimeout(() => {
            if (platform === 'spotify') {
              forceSpotify(url);
            } else {
              window.open(url, '_blank');
            }
            setTimeout(() => item.classList.remove('success'), 1000);
          }, 200);
        });
      });

      // Modal Logic
      const modal = document.getElementById('modal-others');
      const btnOthers = document.getElementById('btn-others');
      const btnClose = document.getElementById('btn-close-modal');

      btnOthers.addEventListener('click', () => modal.classList.add('active'));
      btnClose.addEventListener('click', () => modal.classList.remove('active'));
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    });
  </script>
